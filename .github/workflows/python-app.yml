name: Fastapi - Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fastapi-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Copiar todo Código do Repositório 
        uses: actions/checkout@v4

      - name: Instalar poetry
        run: |
          curl curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configurar Python e cache do Poetry
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: poetry

      - name: Instalar Dependências com o Poetry
        run: poetry install --no-interaction --no-root

      - name: Inicializar Testes
        run: poetry run pytest

  docker-build:
    runs-on: ubuntu-latest
    needs: fastapi-tests

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        ports:
          - 2121:2121
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000

      kafka:
        image: confluentinc/cp-kafka:7.5.0
        ports:
          - 9292:9292
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    steps:
      - name: Copiar todo Código do Repositório 
        uses: actions/checkout@v4
      
      - name: Buildar Container
        run: docker build -t fastapi-app:latest .

      - name: Subir Container
        run: |
          docker rm -f container-teste || true

          docker run -d --network host --name container-teste \
            -e DATABASE_URL="sqlite:///./app.db" \
            -e KAFKA_SERVER="localhost:9092" \
            -e REDIS_HOST="localhost" \
            -e REDIS_PORT="6379" \
            -e REDIS_URL="redis://localhost:6379/0" \
            fastapi-app:latest
          
          sleep 5

          docker logs container-teste

      - name: Verificar se o Container ainda está de Pé
        run: docker ps | grep container-teste | grep Up

      - name: Verificar se a API Responde
        run: curl --fail http://localhost:8000/ || exit 1

      - name: Listar logs Se FALHAR
        if: failure()
        run: docker logs container-teste
      
      - name: Limpar o Container
        if: always()
        run: docker rm -f container-teste
      
