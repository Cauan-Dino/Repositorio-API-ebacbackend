name: FastAPI - Basic Check
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Cache Poetry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.local/bin
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
      
      - name: Instalar Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Instalar dependencias
        run: poetry install --no-interaction --no-root
      
      - name: Rodar Testes
        run: poetry run pytest -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    services:
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        ports:
          - 2181:2181
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000
      
      kafka:
        image: confluentinc/cp-kafka:7.5.0
        ports:
          - 9092:9092
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    
    steps:
      - uses: actions/checkout@v4
      - name: Build imagem
        run: docker build -t fastapi-app:latest .
      
      - name: Subir container de teste (Smoke Test)
        run: |
          docker rm -f container-teste || true

          # --network host permite o container enxergar os services
          # (redis/kafka/zookeeper) expostos em localhost do runner
          docker run -d --network host --name container-teste \
            -e DATABASE_URL="sqlite:///./app.db" \
            -e KAFKA_SERVER="localhost:9092" \
            -e REDIS_HOST="localhost" \
            -e REDIS_PORT="6379" \
            -e REDIS_URL="redis://localhost:6379/0" \
            fastapi-app:latest

          sleep 5

          echo "===== LOGS DO CONTAINER ====="
          docker logs container-teste
          echo "=============================="

      - name: Verificar se o container continua de pé
        run: docker ps | grep container-teste | grep Up

      - name: Validar se a API responde (Healthcheck)
        run: curl --fail http://localhost:8000/docs || exit 1

      - name: Mostrar logs se falhar
        if: failure()
        run: docker logs container-teste

      - name: Limpar o container de teste
        if: always()
        run: docker rm -f container-teste
