name: FastAPI - Basic Check

on:
  push:
    branches: [teste-1.0]
  pull_request:
    branches: [teste-1.0]

jobs:
  fastapi-docker-test:
    runs-on: ubuntu-latest

    steps:
      - name: 🔄 Checkout do código
        uses: actions/checkout@v3

      - name: 🐳 Build da imagem Docker
        run: docker build -t my-fastapi-app .
